services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - staging

  app:
    image: ${`APP_IMAGE`}
    container_name: ecommerce-app
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staging

  queue:
    image: ${APP_IMAGE}
    container_name: ecommerce-queue
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staging

  scheduler:
    image: ${APP_IMAGE}
    container_name: ecommerce-scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staging

  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - staging

volumes:
  mysql_data:

networks:
  staging:
    driver: bridge
