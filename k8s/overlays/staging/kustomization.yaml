apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-staging

resources:
  - namespace.yaml
  - ../../base

patchesStrategicMerge:
  - configmap.yaml

images:
  - name: ecommerce-app
    newName: ghcr.io/dimamaimesko/e-comerce
    newTag: sha-0000000  # CI will update this

patches:
  # Add imagePullSecrets to all pods
  - target:
      kind: Deployment
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          spec:
            imagePullSecrets:
              - name: ghcr-secret
  # Add imagePullSecrets to migration Job
  - target:
      kind: Job
    patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: any
      spec:
        template:
          spec:
            imagePullSecrets:
              - name: ghcr-secret
  # Staging: 1 replica for app (save resources)
  - target:
      kind: Deployment
      name: app
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        replicas: 1
