apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-local

resources:
  - namespace.yaml
  - ../../base
  - configmap.yaml
  - secret.yaml

patches:
  - path: ingress-patch.yaml

images:
  - name: ecommerce-k8s-local
    newName: ecommerce-k8s-local
    newTag: latest
