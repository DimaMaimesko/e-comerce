name: Laravel CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Create SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  build-and-deploy-staging:
    name: Build and deploy staging
    runs-on: ubuntu-latest
    needs: test
#    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_BASE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_sha_full=${IMAGE_BASE}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_staging=${IMAGE_BASE}:staging" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_staging }}" \
            -t "${{ steps.meta.outputs.image_sha }}" \
            -t "${{ steps.meta.outputs.image_sha_full }}" \
            .

      - name: Push Docker images
        run: |
          docker push "${{ steps.meta.outputs.image_staging }}"
          docker push "${{ steps.meta.outputs.image_sha }}"
          docker push "${{ steps.meta.outputs.image_sha_full }}"

      - name: Copy deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.staging.yaml,docker/nginx/default.conf,scripts/deploy-staging.sh"
          target: "/opt/e-commerce"

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ steps.meta.outputs.image_sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: APP_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd /opt/e-commerce

            if [ ! -f .env ]; then
              echo ".env file is missing on server"
              exit 1
            fi

            if grep -q '^APP_IMAGE=' .env; then
              sed -i.bak "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            chmod +x scripts/deploy-staging.sh
            ./scripts/deploy-staging.sh
